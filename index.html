<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SULTANA WIFI</title>

<style>
:root{
--bg:#ffffff;
--card:#111;
--text:#fff;
--input:#222;
}

body.light{
--bg:#fff;
--card:#f5f5f5;
--text:#000;
--input:#ddd;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:var(--bg);
transition:0.5s;
font-family:Arial;
}

.container{
width:360px;
padding:20px;
border-radius:20px;
background:var(--card);
color:var(--text);
box-shadow:0 0 20px rgba(0,0,0,0.3);
position:relative;
overflow:hidden;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* top icons */
.top-icons{
position:absolute;
top:10px;
right:10px;
display:flex;
gap:10px;
}

.icon{
cursor:pointer;
font-size:18px;
}

/* marquee text */
.marquee{
margin-top:40px;
overflow:hidden;
white-space:nowrap;
border-bottom:1px solid gray;
padding-bottom:10px;
}

.marquee span{
display:inline-block;
padding-left:100%;
animation:move 12s linear infinite;
}

@keyframes move{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}

/* form */
.row{
display:flex;
align-items:center;
background:var(--input);
padding:10px;
border-radius:10px;
margin-top:10px;
}

.row input{
flex:1;
border:none;
outline:none;
background:transparent;
color:var(--text);
}

.row i{
margin-right:10px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
cursor:pointer;
}

.remember{
margin-top:10px;
font-size:12px;
}

/* timer */
.timer{
margin-top:10px;
font-size:13px;
color:#00ffcc;
}

</style>
</head>

<body>

<div class="container">

<!-- icons -->
<div class="top-icons">
<span class="icon" onclick="toggleLang()">🌐</span>
<span class="icon" onclick="toggleTheme()">🌙</span>
</div>

<h3 id="title">SULTANA NET WIFI</h3>
<p>sultana.ps</p>

<!-- moving text -->
<div class="marquee">
<span id="scrollText">
أهلاً وسهلاً في شبكة سلطانه — نتمنى لكم أجمل الأوقات — لأي مشكلة لا تتردد في التواصل معنا
</span>
</div>

<!-- username -->
<div class="row">
<i>👤</i>
<input id="user" placeholder="اسم المستخدم">
</div>

<!-- password -->
<div class="row">
<i>🔒</i>
<input type="password" id="pass" placeholder="كلمة المرور">
</div>

<button id="login">دخول</button>

<div class="remember">
<input type="checkbox"> <span id="rememberText">تذكرني</span>
</div>

<div class="timer">
⏳ <span id="count"></span>
</div>

</div>

<script>

// TIMER 8 HOURS
let time = 8*60*60;
function countdown(){
let h=Math.floor(time/3600);
let m=Math.floor((time%3600)/60);
let s=time%60;
document.getElementById("count").innerText =
h+"h "+m+"m "+s+"s";
if(time>0) time--;
}
setInterval(countdown,1000);
countdown();

// THEME TOGGLE
function toggleTheme(){
document.body.classList.toggle("light");
}

// LANGUAGE TOGGLE
let lang="ar";

function toggleLang(){
if(lang==="ar"){
lang="en";

document.getElementById("title").innerText="SULTANA WIFI";
document.getElementById("user").placeholder="Username";
document.getElementById("pass").placeholder="Password";
document.getElementById("login").innerText="Login";
document.getElementById("rememberText").innerText="Remember me";

document.getElementById("scrollText").innerText=
"Welcome to Sultana Network — Enjoy your time — Contact us anytime for support";

}else{
lang="ar";

document.getElementById("title").innerText="SULTANA NET WIFI";
document.getElementById("user").placeholder="اسم المستخدم";
document.getElementById("pass").placeholder="كلمة المرور";
document.getElementById("login").innerText="دخول";
document.getElementById("rememberText").innerText="تذكرني";

document.getElementById("scrollText").innerText=
"أهلاً وسهلاً في شبكة سلطانه — نتمنى لكم أجمل الأوقات — لأي مشكلة لا تتردد في التواصل معنا";
}
}

</script>

</body>
</html>
